{{define "content"}}
<h2>{{.Subject.Name}} — Thiết lập bài thi</h2>

<article>
    <form method="POST" action="/exam/{{.Subject.ID}}/start">
        <label for="question_count">
            Số câu hỏi (tối đa {{.Subject.QuestionCount}})
        </label>
        <input type="number" id="question_count" name="question_count"
               min="1" max="{{.Subject.QuestionCount}}" value="{{.Subject.QuestionCount}}" required>

        <button type="submit">Bắt đầu thi</button>
    </form>
</article>
{{end}}
