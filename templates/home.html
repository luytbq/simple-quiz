{{define "content"}}
{{if .Imported}}
<article style="background: var(--pico-ins-color); padding: 1rem; margin-bottom: 1rem;">
    {{.Imported}}
</article>
{{end}}

<h2>Chủ đề</h2>

{{if .Subjects}}
<div class="grid">
    {{range .Subjects}}
    <article>
        <header>
            <strong>{{.Name}}</strong>
            <small> — {{.QuestionCount}} câu hỏi</small>
        </header>
        <div class="grid">
            <a href="{{bp}}/practice/{{.ID}}" role="button">Flashcard</a>
            <a href="{{bp}}/exam/{{.ID}}" role="button" class="outline">Thi thử</a>
        </div>
    </article>
    {{end}}
</div>
{{else}}
<p>Chưa có chủ đề nào. <a href="{{bp}}/manage">Import câu hỏi</a> để bắt đầu.</p>
{{end}}
{{end}}
